name: Build and Publish NuGet

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: "src/SharpCab/SharpCab.csproj"

jobs:
  publish-nuget:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "NUGET_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pack
        run: |
          if [ -n "${NUGET_VERSION}" ]; then
            dotnet pack ${{ env.PROJECT_PATH }} -c Release --no-build -o ./artifacts /p:PackageVersion=${NUGET_VERSION}
          else
            dotnet pack ${{ env.PROJECT_PATH }} -c Release --no-build -o ./artifacts
          fi

      - name: Publish to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate